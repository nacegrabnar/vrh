<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vrh — Slovenia Outdoor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #fff; }
    header { padding: 20px 40px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo h1 { font-size: 22px; font-weight: 700; }
    .logo span { font-size: 22px; }
    .subtitle { font-size: 13px; color: #888; margin-left: 8px; }
    .search-bar { padding: 8px 16px; border-radius: 8px; border: 1px solid #333; background: #1a1d26; color: #fff; font-size: 14px; width: 260px; outline: none; }
    .search-bar:focus { border-color: #555; }
    .tabs { display: flex; gap: 8px; padding: 20px 40px 0; }
    .tab { padding: 9px 22px; border-radius: 8px; border: 1px solid #333; background: none; color: #aaa; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    .tab.active { background: #fff; color: #000; border-color: #fff; }
    .tab:hover:not(.active) { border-color: #555; color: #fff; }
    .container { padding: 20px 40px; }
    .section-title { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .card { background: #1a1d26; border: 1px solid #2a2d36; border-radius: 12px; padding: 18px; cursor: pointer; transition: all 0.2s; }
    .card:hover { border-color: #444; transform: translateY(-2px); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .card-title { font-size: 17px; font-weight: 600; }
    .badge { padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-peak { background: #1a3a2a; color: #4ade80; }
    .badge-crag { background: #3a1a1a; color: #f87171; }
    .badge-sport { background: #1a2a3a; color: #60a5fa; }
    .badge-hiking { background: #2a2a1a; color: #facc15; }
    .badge-trail_running { background: #2a1a3a; color: #c084fc; }
    .badge-cycling { background: #1a3a3a; color: #34d399; }
    .card-meta { font-size: 12px; color: #666; margin-top: 3px; }
    .card-desc { font-size: 13px; color: #999; margin-top: 10px; line-height: 1.5; }
    .card-desc-pending { font-size: 12px; color: #555; margin-top: 10px; font-style: italic; }
    .grade { font-size: 20px; font-weight: 700; color: #f59e0b; margin: 6px 0; }
    .grade span { font-size: 13px; color: #666; }
    .loading { color: #666; padding: 60px; text-align: center; font-size: 14px; }
    .empty { color: #666; padding: 60px; text-align: center; font-size: 14px; }
    .stats { display: flex; gap: 24px; margin-bottom: 20px; }
    .stat { font-size: 13px; color: #666; }
    .stat strong { color: #fff; font-size: 16px; display: block; }
    .difficulty-easy { color: #4ade80; }
    .difficulty-medium { color: #facc15; }
    .difficulty-hard { color: #f87171; }
    .trail-stats { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
    .trail-stat { font-size: 12px; color: #888; background: #222; padding: 3px 8px; border-radius: 4px; }
    .auth-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #333; background: none; color: #aaa; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .auth-btn:hover { border-color: #555; color: #fff; }
    .auth-btn.primary { background: #fff; color: #000; border-color: #fff; }
    .auth-btn.primary:hover { background: #ddd; }
    .auth-btn.full { width: 100%; padding: 10px; margin-top: 8px; }
    .form-input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #0f1117; color: #fff; font-size: 14px; margin-bottom: 10px; outline: none; }
    .form-input:focus { border-color: #555; }
    .status-good { color: #4ade80; }
    .status-fair { color: #facc15; }
    .status-poor { color: #f87171; }
    .status-closed { color: #f87171; font-weight:600; }
    .report-meta { font-size: 12px; color: #666; margin-top: 8px; }
    .area-section { margin-bottom: 36px; }
    .area-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; font-size: 15px; font-weight: 600; color: #ccc; }
    .area-header::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, #2a2d36, transparent); }
    .area-overflow { overflow: hidden; transition: height 0.35s ease; }
    .show-more-btn { margin-top: 14px; width: 100%; padding: 9px 0; background: none; border: 1px solid #2a2d36; border-radius: 8px; color: #666; font-size: 13px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .show-more-btn:hover { border-color: #444; color: #ccc; }

    /* Detail overlay */
    .detail-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:200; overflow-y:auto; }
    .detail-panel { max-width:700px; margin:40px auto 60px; background:#1a1d26; border:1px solid #2a2d36; border-radius:16px; padding:36px; position:relative; }
    .detail-close { position:absolute; top:14px; right:18px; background:none; border:none; color:#555; font-size:26px; cursor:pointer; line-height:1; padding:4px 8px; }
    .detail-close:hover { color:#fff; }
    .detail-name { font-size:26px; font-weight:700; }
    .detail-section { margin-top:28px; }
    .detail-section-title { font-size:11px; color:#555; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid #222; padding-bottom:8px; margin-bottom:14px; }
    .detail-grades { display:flex; gap:12px; margin:14px 0; flex-wrap:wrap; }
    .detail-grade-block { background:#222; border-radius:8px; padding:10px 18px; text-align:center; min-width:72px; }
    .detail-grade-label { font-size:10px; color:#555; text-transform:uppercase; letter-spacing:0.5px; }
    .detail-grade-value { font-size:22px; font-weight:700; color:#f59e0b; display:block; margin-top:3px; }
    .detail-meta-row { display:flex; gap:10px; flex-wrap:wrap; margin:12px 0; }
    .detail-meta-item { font-size:12px; color:#666; background:#222; padding:8px 12px; border-radius:6px; }
    .detail-meta-item .val { color:#fff; display:block; font-size:15px; font-weight:600; margin-bottom:1px; }
    .detail-desc { font-size:14px; color:#aaa; line-height:1.7; margin-top:12px; }
    .conditions-list { display:flex; flex-direction:column; gap:10px; }
    .condition-item { background:#222; border-radius:8px; padding:12px 16px; }
    .condition-item .cond-status { font-weight:600; font-size:13px; }
    .condition-item .cond-notes { font-size:13px; color:#999; margin-top:5px; }
    .condition-item .cond-meta { font-size:11px; color:#555; margin-top:6px; }
    .photos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin-top:4px; }
    .photo-item { border-radius:8px; overflow:hidden; background:#222; }
    .photo-item img { width:100%; aspect-ratio:1; object-fit:cover; display:block; }
    .photo-caption { font-size:11px; color:#666; padding:4px 6px; }
    .upload-area { border:2px dashed #333; border-radius:8px; padding:20px; text-align:center; cursor:pointer; transition:border-color 0.2s; margin-top:4px; }
    .upload-area:hover { border-color:#555; }
    .upload-area input[type=file] { display:none; }
    .detail-inline-form { background:#222; border-radius:8px; padding:16px; margin-top:12px; }
    .lang-toggle { display:flex; align-items:center; border:1px solid #2a2d36; border-radius:8px; padding:2px; gap:2px; }
    .lang-btn { padding:5px 11px; border-radius:6px; border:none; background:none; color:#555; cursor:pointer; font-size:12px; font-weight:700; letter-spacing:0.5px; transition:all 0.2s; }
    .lang-btn:hover { color:#ccc; }
    .lang-btn-active { background:#fff; color:#000; }
    .primary-nav { display:flex; gap:6px; padding:20px 40px 0; border-bottom:1px solid #2a2d36; background:#0f1117; }
    .primary-nav-btn { padding:9px 22px; border-radius:8px 8px 0 0; border:1px solid transparent; border-bottom:none; background:none; color:#555; cursor:pointer; font-size:14px; font-weight:600; transition:all 0.2s; letter-spacing:0.1px; position:relative; bottom:-1px; }
    .primary-nav-btn:hover:not(.active) { color:#aaa; }
    .primary-nav-btn.active { background:#1a1d26; color:#fff; border-color:#2a2d36; border-bottom-color:#1a1d26; }
    .coming-soon-msg { color:#555; padding:100px 40px; text-align:center; font-size:16px; font-style:italic; letter-spacing:0.3px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <span>🏔️</span>
      <h1>Vrh</h1>
      <span class="subtitle">Slovenia Outdoor</span>
    </div>
    <div style="display:flex;gap:12px;align-items:center">
      <input class="search-bar" type="text" id="search" data-i18n="searchPlaceholder" placeholder="Search summits, routes, trails..." oninput="handleSearch()">
      <div class="lang-toggle">
        <button id="btn-lang-en" class="lang-btn lang-btn-active" onclick="setLang('en')">EN</button>
        <button id="btn-lang-sl" class="lang-btn" onclick="setLang('sl')">SL</button>
      </div>
      <div id="auth-buttons" style="display:flex;gap:8px">
        <button class="auth-btn" data-i18n="login" onclick="showModal('login')">Log in</button>
        <button class="auth-btn primary" data-i18n="signup" onclick="showModal('register')">Sign up</button>
      </div>
      <div id="user-menu" style="display:none">
        <span id="username-display" style="font-size:14px;color:#aaa"></span>
        <button class="auth-btn" data-i18n="logout" onclick="logout()" style="margin-left:8px">Log out</button>
      </div>
    </div>
  </header>

  <!-- Auth Modal -->
  <div id="modal-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;justify-content:center;align-items:center;">
    <div style="background:#1a1d26;border:1px solid #333;border-radius:16px;padding:32px;width:360px;">
      <h2 id="modal-title" style="margin-bottom:20px;font-size:20px"></h2>
      <div id="modal-error" style="display:none;color:#f87171;font-size:13px;margin-bottom:12px;"></div>
      <div id="register-fields">
        <input class="form-input" type="text" id="reg-username" placeholder="Username">
      </div>
      <input class="form-input" type="email" id="auth-email" placeholder="Email">
      <input class="form-input" type="password" id="auth-password" placeholder="Password">
      <button class="auth-btn primary full" id="modal-submit" onclick="submitAuth()">Submit</button>
      <button class="auth-btn full" onclick="closeModal()" style="margin-top:8px">Cancel</button>
    </div>
  </div>

  <!-- Detail overlay -->
  <div id="detail-overlay" class="detail-overlay" onclick="handleDetailOverlayClick(event)">
    <div class="detail-panel">
      <button class="detail-close" onclick="closeDetail()">&#x2715;</button>
      <div id="detail-content"><div class="loading">Loading...</div></div>
    </div>
  </div>

  <div class="primary-nav">
    <button class="primary-nav-btn active" data-cat="hiking"       onclick="showCategory('hiking')">Hiking</button>
    <button class="primary-nav-btn"        data-cat="climbing"     onclick="showCategory('climbing')">Climbing</button>
    <button class="primary-nav-btn"        data-cat="trail_running" onclick="showCategory('trail_running')">Trail Running</button>
    <button class="primary-nav-btn"        data-cat="cycling"      onclick="showCategory('cycling')">Cycling</button>
  </div>
  <div class="tabs" id="sub-tabs">
    <button class="tab active" data-tab="summits"    onclick="showTab('summits', this)">Summits</button>
    <button class="tab"        data-tab="hills"      onclick="showTab('hills', this)">Hills</button>
    <button class="tab"        data-tab="trails"     onclick="showTab('trails', this)">Trails</button>
    <button class="tab"        data-tab="conditions" onclick="showTab('conditions', this)">Conditions</button>
  </div>

  <div class="container">
    <div id="summits-view">
      <div class="stats" id="summit-stats"></div>
      <p class="section-title" data-i18n="sectionSummits">Summits &amp; crags</p>
      <div id="summits-grid"><div class="loading">Loading summits...</div></div>
    </div>
    <div id="hills-view" style="display:none">
      <div class="stats" id="hills-stats"></div>
      <p class="section-title" data-i18n="sectionHills">Hills &amp; lower peaks</p>
      <div id="hills-grid"><div class="loading">Loading hills...</div></div>
    </div>
    <div id="climbing-view" style="display:none">
      <div class="stats" id="climbing-stats"></div>
      <p class="section-title" data-i18n="sectionClimbing">Climbing routes</p>
      <div class="grid" id="climbing-grid"><div class="loading">Loading routes...</div></div>
    </div>
    <div id="trails-view" style="display:none">
      <div class="stats" id="trail-stats"></div>
      <p class="section-title" data-i18n="sectionTrails">Hiking &amp; running trails</p>
      <div class="grid" id="trails-grid"><div class="loading">Loading trails...</div></div>
    </div>
    <div id="conditions-view" style="display:none">
      <div class="stats" id="conditions-stats"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <p class="section-title" data-i18n="sectionConditions">Recent conditions reports</p>
        <button class="auth-btn primary" data-i18n="addReport" onclick="showConditionsForm()" id="report-btn">+ Add report</button>
      </div>
      <div id="conditions-form" style="display:none;background:#1a1d26;border:1px solid #333;border-radius:12px;padding:20px;margin-bottom:20px;">
        <h3 style="margin-bottom:16px;font-size:16px">New conditions report</h3>
        <select class="form-input" id="report-type" onchange="updateReportSelect()">
          <option value="trail">Trail</option>
          <option value="climbing">Climbing route</option>
        </select>
        <select class="form-input" id="report-target"></select>
        <select class="form-input" id="report-status">
          <option value="good">Good conditions</option>
          <option value="fair">Fair conditions</option>
          <option value="poor">Poor conditions</option>
          <option value="closed">Closed / dangerous</option>
        </select>
        <textarea class="form-input" id="report-notes" placeholder="Describe the conditions in detail..." rows="3" style="resize:vertical"></textarea>
        <button class="auth-btn primary" onclick="submitConditions()">Submit report</button>
        <button class="auth-btn" onclick="document.getElementById('conditions-form').style.display='none'" style="margin-left:8px">Cancel</button>
      </div>
      <div class="grid" id="conditions-grid"><div class="loading">Loading conditions...</div></div>
    </div>
    <div id="coming-soon-view" style="display:none">
      <p class="coming-soon-msg" data-i18n="comingSoon">Coming soon / Kmalu na voljo</p>
    </div>
  </div>

  <script>
    const API = '';
    let allSummits = [], allHills = [], allClimbing = [], allTrails = [];
    let currentTab = 'summits';
    let currentCategory = 'hiking';
    let currentHikingTab = 'summits';

    // ── i18n ──────────────────────────────────────────────────────
    const TRANSLATIONS = {
      en: {
        tabs: { summits:'Summits', hills:'Hills', climbing:'Climbing Routes', trails:'Trails', conditions:'Conditions' },
        sectionSummits:'Summits & crags', sectionHills:'Hills & lower peaks',
        sectionClimbing:'Climbing routes', sectionTrails:'Hiking & running trails',
        sectionConditions:'Recent conditions reports',
        searchPlaceholder:'Search summits, routes, trails...',
        login:'Log in', signup:'Sign up', logout:'Log out',
        addReport:'+ Add report', showLess:'Show less',
        noConditions:'No conditions reports yet — be the first!',
        statusGood:'Good conditions', statusFair:'Fair conditions',
        statusPoor:'Poor conditions', statusClosed:'Closed / dangerous',
        loginTitle:'Log in', registerTitle:'Create account',
        difficulty: { hard:'hard', medium:'medium', easy:'easy' },
        activityType: { hiking:'hiking', sport:'sport', alpine:'alpine', trail_running:'trail_running', cycling:'cycling' },
        noSummitsFound: 'No summits found', noHillsFound: 'No hills found',
        noRoutesFound: 'No routes found', noTrailsFound: 'No trails found',
        bolts: 'bolts',
        catHiking: 'Hiking', catClimbing: 'Climbing', catTrailRunning: 'Trail Running', catCycling: 'Cycling',
        comingSoon: 'Coming soon / Kmalu na voljo'
      },
      sl: {
        tabs: { summits:'Vrhovi', hills:'Hribi', climbing:'Plezalne smeri', trails:'Poti', conditions:'Razmere' },
        sectionSummits:'Vsi vrhovi', sectionHills:'Hribi in nižji vrhovi',
        sectionClimbing:'Plezalne smeri', sectionTrails:'Pohodniške in tekaške poti',
        sectionConditions:'Zadnja poročila o razmerah',
        searchPlaceholder:'Išči vrhove, smeri, poti...',
        login:'Prijava', signup:'Registracija', logout:'Odjava',
        addReport:'+ Dodaj poročilo', showLess:'Pokaži manj',
        noConditions:'Še ni poročil — bodi prvi!',
        statusGood:'Dobre razmere', statusFair:'Srednje razmere',
        statusPoor:'Slabe razmere', statusClosed:'Zaprto / nevarno',
        loginTitle:'Prijava', registerTitle:'Ustvari račun',
        difficulty: { hard:'zahtevno', medium:'srednje zahtevno', easy:'lahko' },
        activityType: { hiking:'pohodništvo', sport:'športno plezanje', alpine:'alpinizem', trail_running:'tek v naravi', cycling:'kolesarjenje' },
        noSummitsFound: 'Ni najdenih vrhov', noHillsFound: 'Ni najdenih hribov',
        noRoutesFound: 'Ni najdenih smeri', noTrailsFound: 'Ni najdenih poti',
        bolts: 'svedrov',
        catHiking: 'Pohodništvo', catClimbing: 'Plezanje', catTrailRunning: 'Tek v naravi', catCycling: 'Kolesarjenje',
        comingSoon: 'Kmalu na voljo / Coming soon'
      }
    };
    let lang = localStorage.getItem('vrh_lang') || 'en';
    function t(key) { return (TRANSLATIONS[lang] || TRANSLATIONS.en)[key] || key; }
    function tShowMore(n) {
      return lang === 'sl' ? `Pokaži več (${n} preostalih)` : `Show more (${n} remaining)`;
    }
    function desc(item) {
      return (lang === 'sl' && item.description_sl) ? item.description_sl : (item.description || '');
    }
    function cardDesc(item) {
      if (lang === 'sl') {
        if (item.description_sl) return `<div class="card-desc">${item.description_sl}</div>`;
        return `<div class="card-desc-pending">Opis kmalu / Description coming soon</div>`;
      }
      return item.description ? `<div class="card-desc">${item.description}</div>` : '';
    }
    function tDifficulty(d) { return ((TRANSLATIONS[lang] || TRANSLATIONS.en).difficulty || {})[d] || d; }
    function tActivityType(a) { return ((TRANSLATIONS[lang] || TRANSLATIONS.en).activityType || {})[a] || a; }

    function applyTranslations() {
      const T = TRANSLATIONS[lang];
      // Primary nav buttons
      const catKeys = { hiking:'catHiking', climbing:'catClimbing', trail_running:'catTrailRunning', cycling:'catCycling' };
      document.querySelectorAll('.primary-nav-btn[data-cat]').forEach(btn => {
        const key = catKeys[btn.dataset.cat];
        if (key && T[key]) btn.textContent = T[key];
      });
      // Sub-tabs
      document.querySelectorAll('.tab[data-tab]').forEach(btn => {
        const k = btn.dataset.tab;
        if (T.tabs[k]) btn.textContent = T.tabs[k];
      });
      // All data-i18n elements
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const val = T[el.dataset.i18n];
        if (!val) return;
        if (el.tagName === 'INPUT') el.placeholder = val;
        else el.textContent = val;
      });
      // Status dropdowns
      const sel = document.getElementById('report-status');
      if (sel) {
        const cur = sel.value;
        sel.innerHTML = [
          ['good', T.statusGood], ['fair', T.statusFair],
          ['poor', T.statusPoor], ['closed', T.statusClosed]
        ].map(([v, l]) => `<option value="${v}">${l}</option>`).join('');
        sel.value = cur;
      }
      // Lang toggle
      document.getElementById('btn-lang-en').classList.toggle('lang-btn-active', lang === 'en');
      document.getElementById('btn-lang-sl').classList.toggle('lang-btn-active', lang === 'sl');
    }

    function setLang(newLang) {
      lang = newLang;
      localStorage.setItem('vrh_lang', newLang);
      applyTranslations();
      if (currentTab === 'summits')   renderSummits(allSummits);
      else if (currentTab === 'hills')      renderHills(allHills);
      else if (currentTab === 'climbing')   renderClimbing(allClimbing, t('sectionClimbing'));
      else if (currentTab === 'trails')     renderTrails(allTrails, t('sectionTrails'));
      else if (currentTab === 'conditions') loadConditions();
    }

    async function loadConditions() {
      const res = await fetch('/conditions/recent');
      const conditions = await res.json();
      document.getElementById('conditions-stats').innerHTML = `
        <div class="stat"><strong>${conditions.length}</strong> recent reports</div>
      `;
      const grid = document.getElementById('conditions-grid');
      if (conditions.length === 0) {
        grid.innerHTML = `<div class="empty">${t('noConditions')}</div>`;
        return;
      }
      grid.innerHTML = conditions.map(c => `
        <div class="card">
          <div class="card-header">
            <div class="card-title">${c.trail_name || c.route_name}</div>
            <span class="status-${c.status}">${c.status}</span>
          </div>
          <div class="card-desc">${c.notes || 'No details provided.'}</div>
          <div class="report-meta">Reported by ${c.username || 'Admin'} · ${new Date(c.reported_at).toLocaleDateString()}</div>
        </div>
      `).join('');
    }

    function showConditionsForm() {
      document.getElementById('conditions-form').style.display = 'block';
      updateReportSelect();
    }

    function updateReportSelect() {
      const type = document.getElementById('report-type').value;
      const select = document.getElementById('report-target');
      const items = type === 'trail' ? allTrails : allClimbing;
      select.innerHTML = items.map(i => `<option value="${i.id}">${i.name}</option>`).join('');
    }

    async function submitConditions() {
      const token = localStorage.getItem('vrh_token');
      const type = document.getElementById('report-type').value;
      const targetId = document.getElementById('report-target').value;
      const status = document.getElementById('report-status').value;
      const notes = document.getElementById('report-notes').value;

      const body = {
        status,
        notes,
        trail_id: type === 'trail' ? targetId : null,
        climbing_route_id: type === 'climbing' ? targetId : null
      };

      const res = await fetch('/conditions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(body)
      });

      if (res.ok) {
        document.getElementById('conditions-form').style.display = 'none';
        document.getElementById('report-notes').value = '';
        loadConditions();
      }
    }
    async function loadAll() {
      const [summitsRes, hillsRes, climbingRes, trailsRes] = await Promise.all([
        fetch(`${API}/summits?type=summits`),
        fetch(`${API}/summits?type=hills`),
        fetch(`${API}/climbing-routes`),
        fetch(`${API}/trails`)
      ]);
      allSummits = await summitsRes.json();
      allHills   = await hillsRes.json();
      allClimbing = await climbingRes.json();
      allTrails = await trailsRes.json();
      renderSummits(allSummits);
      renderHills(allHills);
      renderClimbing(allClimbing);
      renderTrails(allTrails);
    }

    function renderAreaGrouped(summits, gridId, idPrefix, emptyMsg) {
      const grid = document.getElementById(gridId);
      if (summits.length === 0) { grid.innerHTML = `<div class="empty">${emptyMsg || t('noSummitsFound')}</div>`; return; }
      const groups = {};
      for (const s of summits) {
        const area = s.area_name || 'Other';
        if (!groups[area]) groups[area] = [];
        groups[area].push(s);
      }
      const LIMIT = 6;
      const card = s => {
        const displayName = lang === 'sl' && s.name_sl ? s.name_sl : s.name;
        return `
        <div class="card" onclick="filterBySummit('${s.id}', '${s.name}')">
          <div class="card-header">
            <div class="card-title">${displayName}</div>
            <span class="badge badge-${s.type}">${s.type}</span>
          </div>
          <div class="card-meta">${s.elevation_m}m elevation</div>
          <div class="card-desc">${desc(s)}</div>
        </div>`;
      };
      grid.innerHTML = Object.entries(groups).map(([area, items]) => {
        const areaId = idPrefix + '-' + area.toLowerCase().replace(/[^a-z0-9]+/g, '-');
        const visible = items.slice(0, LIMIT);
        const hidden  = items.slice(LIMIT);
        return `
          <div class="area-section">
            <div class="area-header">${area}</div>
            <div class="grid">${visible.map(card).join('')}</div>
            ${hidden.length ? `
              <div class="area-overflow" id="overflow-${areaId}" style="height:0" data-expanded="0">
                <div class="grid" style="margin-top:14px">${hidden.map(card).join('')}</div>
              </div>
              <button class="show-more-btn" id="btn-${areaId}"
                onclick="toggleAreaOverflow('${areaId}', ${hidden.length})">
                ${tShowMore(hidden.length)}
              </button>` : ''}
          </div>`;
      }).join('');
    }

    function renderSummits(summits) {
      const peaks = summits.filter(s => s.type === 'peak').length;
      const crags = summits.filter(s => s.type === 'crag').length;
      document.getElementById('summit-stats').innerHTML = `
        <div class="stat"><strong>${summits.length}</strong> total</div>
        <div class="stat"><strong>${peaks}</strong> peaks</div>
        <div class="stat"><strong>${crags}</strong> crags</div>
      `;
      renderAreaGrouped(summits, 'summits-grid', 's');
    }

    function renderHills(hills) {
      document.getElementById('hills-stats').innerHTML = `
        <div class="stat"><strong>${hills.length}</strong> total</div>
      `;
      renderAreaGrouped(hills, 'hills-grid', 'h', t('noHillsFound'));
    }

    function renderClimbing(routes, title) {
      document.getElementById('climbing-stats').innerHTML = `
        <div class="stat"><strong>${routes.length}</strong> routes</div>
        <div class="stat"><strong>${routes.filter(r => r.grade_french >= '8').length}</strong> grade 8+</div>
      `;
      if (title) document.querySelector('#climbing-view .section-title').textContent = title;
      const grid = document.getElementById('climbing-grid');
      if (routes.length === 0) { grid.innerHTML = `<div class="empty">${t('noRoutesFound')}</div>`; return; }
      grid.innerHTML = routes.map(r => `
        <div class="card" onclick="openDetail('climbing', '${r.id}')">
          <div class="card-header">
            <div class="card-title">${lang === 'sl' && r.name_sl ? r.name_sl : r.name}</div>
            <span class="badge badge-sport">${tActivityType(r.type)}</span>
          </div>
<div class="grade">${r.grade_french || r.grade_alpine || ''} <span>${r.grade_uiaa ? '/ ' + r.grade_uiaa : ''}</span></div>
          <div class="card-meta">${r.length_m ? r.length_m + 'm' : ''} ${r.num_bolts ? '· ' + r.num_bolts + ' ' + t('bolts') : ''}</div>
          ${cardDesc(r)}
        </div>
      `).join('');
    }

    function renderTrails(trails, title) {
      const totalKm = trails.reduce((sum, t) => sum + (t.distance_km || 0), 0).toFixed(0);
      document.getElementById('trail-stats').innerHTML = `
        <div class="stat"><strong>${trails.length}</strong> trails</div>
        <div class="stat"><strong>${totalKm}km</strong> total distance</div>
      `;
      if (title) document.querySelector('#trails-view .section-title').textContent = title;
      const grid = document.getElementById('trails-grid');
      if (trails.length === 0) { grid.innerHTML = `<div class="empty">${t('noTrailsFound')}</div>`; return; }
      grid.innerHTML = trails.map(t => `
        <div class="card" onclick="openDetail('trail', '${t.id}')">
          <div class="card-header">
            <div class="card-title">${lang === 'sl' && t.name_sl ? t.name_sl : t.name}</div>
            <span class="badge badge-${t.activity_type}">${tActivityType(t.activity_type)}</span>
          </div>
          <div class="card-meta difficulty-${t.difficulty}">${tDifficulty(t.difficulty)}</div>
          <div class="trail-stats">
            <span class="trail-stat">${t.distance_km}km</span>
            <span class="trail-stat">+${t.elevation_gain_m}m</span>
          </div>
          ${cardDesc(t)}
        </div>
      `).join('');
    }

    function filterBySummit(id, name) {
      const routes = allClimbing.filter(r => r.summit_id === id);
      const trails = allTrails.filter(t => t.summit_id === id);
      if (routes.length > 0) {
        showCategory('climbing');
        renderClimbing(routes, `${t('sectionClimbing')} — ${name}`);
      } else if (trails.length > 0) {
        showCategory('hiking');
        showTab('trails', document.querySelector('#sub-tabs .tab[data-tab="trails"]'));
        renderTrails(trails, `${t('sectionTrails')} — ${name}`);
      }
    }

    function handleSearch() {
      if (!currentTab) return;
      const q = document.getElementById('search').value.toLowerCase();
      const matchSummit = s => s.name.toLowerCase().includes(q) || (s.description || '').toLowerCase().includes(q);
      if (currentTab === 'summits') renderSummits(allSummits.filter(matchSummit));
      if (currentTab === 'hills')   renderHills(allHills.filter(matchSummit));
      if (currentTab === 'climbing') renderClimbing(allClimbing.filter(r => r.name.toLowerCase().includes(q) || r.grade_french.toLowerCase().includes(q)));
      if (currentTab === 'trails') renderTrails(allTrails.filter(t => t.name.toLowerCase().includes(q)));
    }

    function showTab(tab, btn) {
      currentTab = tab;
      if (['summits', 'hills', 'trails', 'conditions'].includes(tab)) currentHikingTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      if (btn) btn.classList.add('active');
      document.getElementById('summits-view').style.display    = tab === 'summits'    ? 'block' : 'none';
      document.getElementById('hills-view').style.display      = tab === 'hills'      ? 'block' : 'none';
      document.getElementById('climbing-view').style.display   = tab === 'climbing'   ? 'block' : 'none';
      document.getElementById('trails-view').style.display     = tab === 'trails'     ? 'block' : 'none';
      document.getElementById('conditions-view').style.display = tab === 'conditions' ? 'block' : 'none';
      document.getElementById('coming-soon-view').style.display = 'none';
      if (tab === 'conditions') { loadConditions(); document.getElementById('report-btn').style.display = 'block'; }
      document.getElementById('search').value = '';
      if (tab === 'summits')  renderSummits(allSummits);
      if (tab === 'hills')    renderHills(allHills);
      if (tab === 'climbing') renderClimbing(allClimbing, t('sectionClimbing'));
      if (tab === 'trails')   renderTrails(allTrails, t('sectionTrails'));
    }

    function showCategory(cat) {
      currentCategory = cat;
      document.querySelectorAll('.primary-nav-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
      const subTabs = document.getElementById('sub-tabs');
      if (cat === 'hiking') {
        subTabs.style.display = 'flex';
        showTab(currentHikingTab, document.querySelector(`#sub-tabs .tab[data-tab="${currentHikingTab}"]`));
      } else if (cat === 'climbing') {
        subTabs.style.display = 'none';
        showTab('climbing', null);
      } else {
        subTabs.style.display = 'none';
        ['summits', 'hills', 'climbing', 'trails', 'conditions'].forEach(v =>
          document.getElementById(v + '-view').style.display = 'none');
        document.getElementById('coming-soon-view').style.display = 'block';
        currentTab = null;
      }
    }

    let currentUser = null;
    let authMode = 'login';

    function showModal(mode) {
      authMode = mode;
      document.getElementById('modal-title').textContent = mode === 'login' ? t('loginTitle') : t('registerTitle');
      document.getElementById('register-fields').style.display = mode === 'register' ? 'block' : 'none';
      document.getElementById('modal-error').style.display = 'none';
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal-overlay').style.display = 'none';
      document.getElementById('auth-email').value = '';
      document.getElementById('auth-password').value = '';
      document.getElementById('reg-username').value = '';
    }

    async function submitAuth() {
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      const errorEl = document.getElementById('modal-error');

      let body = { email, password };
      if (authMode === 'register') {
        body.username = document.getElementById('reg-username').value;
      }

      try {
        const res = await fetch(`/auth/${authMode}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error;
          errorEl.style.display = 'block';
          return;
        }
        localStorage.setItem('vrh_token', data.token);
        localStorage.setItem('vrh_user', JSON.stringify(data.user));
        currentUser = data.user;
        updateAuthUI();
        closeModal();
      } catch (err) {
        errorEl.textContent = 'Something went wrong, please try again.';
        errorEl.style.display = 'block';
      }
    }

    function logout() {
      localStorage.removeItem('vrh_token');
      localStorage.removeItem('vrh_user');
      currentUser = null;
      updateAuthUI();
    }

    function updateAuthUI() {
      if (currentUser) {
        document.getElementById('auth-buttons').style.display = 'none';
        document.getElementById('user-menu').style.display = 'flex';
        document.getElementById('username-display').textContent = `Hi, ${currentUser.username}!`;
      } else {
        document.getElementById('auth-buttons').style.display = 'flex';
        document.getElementById('user-menu').style.display = 'none';
      }
    }

    // Check if already logged in
    const savedUser = localStorage.getItem('vrh_user');
    if (savedUser) {
      currentUser = JSON.parse(savedUser);
      updateAuthUI();
    }
    loadAll();
    applyTranslations();
    showCategory('hiking');

    // ── Summit area expand/collapse ───────────────────────────────

    function toggleAreaOverflow(areaId, hiddenCount) {
      const panel = document.getElementById('overflow-' + areaId);
      const btn   = document.getElementById('btn-' + areaId);
      const expanded = panel.dataset.expanded === '1';

      if (expanded) {
        // Collapse: auto → px (reflow) → 0
        panel.style.height = panel.scrollHeight + 'px';
        panel.offsetHeight; // force reflow so transition fires
        panel.style.height = '0';
        panel.dataset.expanded = '0';
        btn.textContent = tShowMore(hiddenCount);
      } else {
        // Expand: 0 → scrollHeight, then auto so resize works
        panel.style.height = panel.scrollHeight + 'px';
        panel.dataset.expanded = '1';
        btn.textContent = t('showLess');
        panel.addEventListener('transitionend', () => {
          if (panel.dataset.expanded === '1') panel.style.height = 'auto';
        }, { once: true });
      }
    }

    // ── Detail panel ──────────────────────────────────────────────

    let detailType = null;
    let detailId = null;

    function handleDetailOverlayClick(e) {
      if (e.target === document.getElementById('detail-overlay')) closeDetail();
    }

    function closeDetail() {
      document.getElementById('detail-overlay').style.display = 'none';
      detailType = null;
      detailId = null;
    }

    async function openDetail(type, id) {
      detailType = type;
      detailId = id;
      const overlay = document.getElementById('detail-overlay');
      overlay.style.display = 'block';
      overlay.scrollTop = 0;
      document.getElementById('detail-content').innerHTML = '<div class="loading">Loading...</div>';

      const base = type === 'climbing' ? 'climbing-routes' : 'trails';
      const condBase = type === 'climbing' ? 'climbing' : 'trail';
      const [itemRes, condRes, photoRes] = await Promise.all([
        fetch(`/${base}/${id}`),
        fetch(`/conditions/${condBase}/${id}`),
        fetch(`/photos/${condBase}/${id}`)
      ]);

      const item = await itemRes.json();
      const conditions = condRes.ok ? await condRes.json() : [];
      const photos = photoRes.ok ? await photoRes.json() : [];
      renderDetailContent(type, item, conditions, photos);
    }

    function renderDetailContent(type, item, conditions, photos) {
      const isClimbing = type === 'climbing';
      const token = localStorage.getItem('vrh_token');

      const gradesHtml = isClimbing ? `
        <div class="detail-grades">
          ${item.grade_french ? `<div class="detail-grade-block"><div class="detail-grade-label">French</div><span class="detail-grade-value">${item.grade_french}</span></div>` : ''}
          ${item.grade_uiaa   ? `<div class="detail-grade-block"><div class="detail-grade-label">UIAA</div><span class="detail-grade-value">${item.grade_uiaa}</span></div>` : ''}
          ${item.grade_alpine ? `<div class="detail-grade-block"><div class="detail-grade-label">Alpine</div><span class="detail-grade-value">${item.grade_alpine}</span></div>` : ''}
        </div>` : '';

      const metaHtml = isClimbing ? `
        <div class="detail-meta-row">
          ${item.length_m   ? `<div class="detail-meta-item"><span class="val">${item.length_m}m</span>Length</div>` : ''}
          ${item.num_bolts  ? `<div class="detail-meta-item"><span class="val">${item.num_bolts}</span>${t('bolts')}</div>` : ''}
          ${item.rock_type  ? `<div class="detail-meta-item"><span class="val">${item.rock_type}</span>Rock</div>` : ''}
          <div class="detail-meta-item"><span class="val">${tActivityType(item.type)}</span>Type</div>
        </div>` : `
        <div class="detail-meta-row">
          <div class="detail-meta-item difficulty-${item.difficulty}"><span class="val">${tDifficulty(item.difficulty)}</span>Difficulty</div>
          ${item.distance_km      ? `<div class="detail-meta-item"><span class="val">${item.distance_km}km</span>Distance</div>` : ''}
          ${item.elevation_gain_m ? `<div class="detail-meta-item"><span class="val">+${item.elevation_gain_m}m</span>Elevation</div>` : ''}
          <div class="detail-meta-item"><span class="val">${tActivityType(item.activity_type)}</span>Activity</div>
        </div>`;

      const badgeClass = isClimbing ? 'badge-sport' : `badge-${item.activity_type}`;
      const badgeText  = isClimbing ? tActivityType(item.type) : tActivityType(item.activity_type);

      const conditionsHtml = conditions.length === 0
        ? '<div style="color:#555;font-size:13px">No conditions reports yet.</div>'
        : `<div class="conditions-list">${conditions.map(c => `
            <div class="condition-item">
              <span class="cond-status status-${c.status}">${c.status}</span>
              ${c.notes ? `<div class="cond-notes">${c.notes}</div>` : ''}
              <div class="cond-meta">Reported by ${c.username} &middot; ${new Date(c.reported_at).toLocaleDateString()}</div>
            </div>`).join('')}
          </div>`;

      const photosHtml = photos.length === 0
        ? '<div style="color:#555;font-size:13px">No photos yet.</div>'
        : `<div class="photos-grid">${photos.map(p => `
            <div class="photo-item">
              <img src="${p.url}" alt="${p.caption || ''}">
              ${p.caption ? `<div class="photo-caption">${p.caption}</div>` : ''}
            </div>`).join('')}
          </div>`;

      const condFormHtml = token ? `
        <button class="auth-btn" onclick="document.getElementById('detail-cond-form').style.display='block';this.style.display='none'" style="margin-top:12px">+ Add report</button>
        <div id="detail-cond-form" class="detail-inline-form" style="display:none">
          <select class="form-input" id="detail-cond-status">
            <option value="good">${t('statusGood')}</option>
            <option value="fair">${t('statusFair')}</option>
            <option value="poor">${t('statusPoor')}</option>
            <option value="closed">${t('statusClosed')}</option>
          </select>
          <textarea class="form-input" id="detail-cond-notes" placeholder="Describe the conditions..." rows="2" style="resize:vertical"></textarea>
          <button class="auth-btn primary" onclick="submitDetailConditions()">Submit</button>
          <button class="auth-btn" onclick="document.getElementById('detail-cond-form').style.display='none'" style="margin-left:8px">Cancel</button>
        </div>` : '<div style="color:#555;font-size:12px;margin-top:10px">Log in to add a conditions report.</div>';

      const photoFormHtml = token ? `
        <button class="auth-btn" onclick="document.getElementById('detail-photo-form').style.display='block';this.style.display='none'" style="margin-top:12px">+ Upload photo</button>
        <div id="detail-photo-form" class="detail-inline-form" style="display:none">
          <label class="upload-area" for="detail-photo-input">
            <div style="color:#666;font-size:14px">Click to select a photo</div>
            <div id="detail-photo-name" style="color:#888;font-size:12px;margin-top:4px"></div>
            <input type="file" id="detail-photo-input" accept="image/*" onchange="handlePhotoSelect()">
          </label>
          <input class="form-input" type="text" id="detail-photo-caption" placeholder="Caption (optional)" style="margin-top:8px">
          <button class="auth-btn primary" onclick="submitDetailPhoto()" style="margin-top:4px">Upload</button>
          <button class="auth-btn" onclick="document.getElementById('detail-photo-form').style.display='none'" style="margin-left:8px">Cancel</button>
        </div>` : '<div style="color:#555;font-size:12px;margin-top:10px">Log in to upload photos.</div>';

      document.getElementById('detail-content').innerHTML = `
        <div class="card-header" style="margin-bottom:6px">
          <div class="detail-name">${lang === 'sl' && item.name_sl ? item.name_sl : item.name}</div>
          <span class="badge ${badgeClass}">${badgeText}</span>
        </div>
        ${gradesHtml}
        ${metaHtml}
        ${desc(item) ? `<div class="detail-desc">${desc(item)}</div>` : ''}

        <div class="detail-section">
          <div class="detail-section-title">Conditions reports</div>
          ${conditionsHtml}
          ${condFormHtml}
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Photos</div>
          ${photosHtml}
          ${photoFormHtml}
        </div>`;
    }

    function handlePhotoSelect() {
      const file = document.getElementById('detail-photo-input').files[0];
      if (file) document.getElementById('detail-photo-name').textContent = file.name;
    }

    async function submitDetailConditions() {
      const token = localStorage.getItem('vrh_token');
      const body = {
        status: document.getElementById('detail-cond-status').value,
        notes: document.getElementById('detail-cond-notes').value,
        trail_id: detailType === 'trail' ? detailId : null,
        climbing_route_id: detailType === 'climbing' ? detailId : null
      };
      const res = await fetch('/conditions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body)
      });
      if (res.ok) openDetail(detailType, detailId);
    }

    async function submitDetailPhoto() {
      const token = localStorage.getItem('vrh_token');
      const file = document.getElementById('detail-photo-input').files[0];
      if (!file) return;
      const caption = document.getElementById('detail-photo-caption').value;
      const formData = new FormData();
      formData.append('photo', file);
      if (caption) formData.append('caption', caption);
      const endpoint = detailType === 'climbing'
        ? `/photos/climbing/${detailId}`
        : `/photos/trail/${detailId}`;
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });
      if (res.ok) openDetail(detailType, detailId);
    }
  </script>
</body>
</html>
